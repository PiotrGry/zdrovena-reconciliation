<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zdrovena — Panel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 18px; font-weight: 600; }

    #user-info { font-size: 14px; color: #555; display: flex; gap: 12px; align-items: center; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      padding: 8px 16px;
      font-weight: 500;
    }

    .btn-primary { background: #0078d4; color: #fff; }
    .btn-primary:hover { background: #006cbe; }
    .btn-secondary { background: #f0f0f0; color: #1a1a1a; }
    .btn-secondary:hover { background: #e0e0e0; }
    .btn-danger { background: #c42b1c; color: #fff; }
    .btn-danger:hover { background: #a81c10; }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    main { max-width: 960px; margin: 32px auto; padding: 0 24px; }

    #login-screen { text-align: center; margin-top: 100px; }
    #login-screen p { color: #555; margin-bottom: 24px; }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-header h2 { font-size: 16px; font-weight: 600; }

    #prefix-input {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 14px;
      width: 240px;
      margin-right: 8px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 8px 12px; border-bottom: 2px solid #e0e0e0; color: #555; font-weight: 500; }
    td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    td a { color: #0078d4; text-decoration: none; }
    td a:hover { text-decoration: underline; }

    .empty { color: #999; font-style: italic; padding: 16px 0; text-align: center; }

    #close-section { }
    #close-result {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }
    .result-ok { background: #dff6dd; color: #107c10; border: 1px solid #a7d7a0; }
    .result-err { background: #fde7e9; color: #a4262c; border: 1px solid #f1aaac; }

    #status-bar {
      font-size: 13px;
      color: #888;
      margin-top: 8px;
    }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: #0078d4; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>Zdrovena</h1>
  <div id="user-info">
    <span id="username"></span>
    <button class="btn-secondary" id="logout-btn" style="display:none" onclick="logout()">Wyloguj</button>
  </div>
</header>

<main>
  <!-- Login screen -->
  <div id="login-screen">
    <p>Zaloguj się kontem firmowym (Entra ID).</p>
    <button class="btn-primary" onclick="login()">Zaloguj przez Microsoft</button>
  </div>

  <!-- Authenticated content -->
  <div id="app" style="display:none">

    <!-- Files -->
    <div class="card">
      <div class="card-header">
        <h2>Pliki</h2>
        <div>
          <input id="prefix-input" type="text" placeholder="Prefiks (np. invoices/)" />
          <button class="btn-secondary" id="refresh-btn" onclick="loadFiles()">Odśwież</button>
        </div>
      </div>
      <div id="status-bar"></div>
      <div id="files-container">
        <p class="empty">Kliknij Odśwież aby załadować pliki.</p>
      </div>
    </div>

    <!-- Monthly close -->
    <div class="card" id="close-section" style="display:none">
      <div class="card-header">
        <h2>Zamknięcie miesiąca</h2>
      </div>
      <p style="font-size:14px;color:#555;margin-bottom:16px">
        Uruchom pipeline zamknięcia miesiąca. Operacja jest nieodwracalna.
      </p>
      <button class="btn-danger" id="close-btn" onclick="triggerClose()">Uruchom zamknięcie</button>
      <div id="close-result"></div>
    </div>

  </div>
</main>

<!-- MSAL.js v3 from CDN -->
<script src="https://alcdn.msauth.net/browser/3.27.0/js/msal-browser.min.js"></script>
<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  // These values are replaced at deploy time by SWA environment variables
  // or set here directly for the dev build.
  const API_CLIENT_ID = window.__AZURE_API_CLIENT_ID__ || "__AZURE_API_CLIENT_ID__";
  const TENANT_ID     = window.__AZURE_TENANT_ID__     || "__AZURE_TENANT_ID__";

  const msalConfig = {
    auth: {
      clientId:  API_CLIENT_ID,
      authority: `https://login.microsoftonline.com/${TENANT_ID}`,
      redirectUri: window.location.origin,
    },
    cache: { cacheLocation: "sessionStorage" },
  };

  const msalInstance = new msal.PublicClientApplication(msalConfig);

  const tokenRequest = {
    scopes: [`api://${API_CLIENT_ID}/.default`],
  };

  // ── Auth ────────────────────────────────────────────────────────────────────
  async function init() {
    await msalInstance.initialize();
    const result = await msalInstance.handleRedirectPromise();
    if (result) setAccount(result.account);
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      setAccount(accounts[0]);
      showApp();
    }
  }

  async function login() {
    await msalInstance.loginRedirect({ ...tokenRequest, prompt: "select_account" });
  }

  async function logout() {
    await msalInstance.logoutRedirect();
  }

  function setAccount(account) {
    document.getElementById("username").textContent = account.name || account.username;
    document.getElementById("logout-btn").style.display = "";
  }

  function showApp() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "";
    // Show close button only for admin/accountant (checked via roles claim)
    getToken().then(token => {
      if (!token) return;
      const payload = JSON.parse(atob(token.split(".")[1]));
      const roles = payload.roles || [];
      if (roles.includes("zdrovena-admin") || roles.includes("zdrovena-accountant")) {
        document.getElementById("close-section").style.display = "";
      }
    });
  }

  async function getToken() {
    try {
      const accounts = msalInstance.getAllAccounts();
      if (!accounts.length) return null;
      const res = await msalInstance.acquireTokenSilent({ ...tokenRequest, account: accounts[0] });
      return res.accessToken;
    } catch {
      const res = await msalInstance.acquireTokenRedirect(tokenRequest);
      return res?.accessToken || null;
    }
  }

  // ── API calls ───────────────────────────────────────────────────────────────
  function setStatus(msg) {
    document.getElementById("status-bar").innerHTML = msg
      ? `<span class="spinner"></span>${msg}`
      : "";
  }

  async function loadFiles() {
    const btn = document.getElementById("refresh-btn");
    btn.disabled = true;
    setStatus("Ładowanie plików...");
    const token = await getToken();
    if (!token) { setStatus(""); btn.disabled = false; return; }

    const prefix = document.getElementById("prefix-input").value;
    const url = `/api/files${prefix ? "?prefix=" + encodeURIComponent(prefix) : ""}`;

    try {
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const files = await res.json();
      renderFiles(files);
      setStatus("");
    } catch (e) {
      setStatus(`Błąd: ${e.message}`);
    } finally {
      btn.disabled = false;
    }
  }

  function renderFiles(files) {
    const container = document.getElementById("files-container");
    if (!files.length) {
      container.innerHTML = `<p class="empty">Brak plików.</p>`;
      return;
    }
    const rows = files.map(f => `
      <tr>
        <td><a href="/api/files/${encodeURIComponent(f.key)}" target="_blank">${f.key}</a></td>
        <td>${formatBytes(f.size)}</td>
        <td>${new Date(f.last_modified).toLocaleString("pl-PL")}</td>
      </tr>`).join("");
    container.innerHTML = `
      <table>
        <thead><tr><th>Ścieżka</th><th>Rozmiar</th><th>Modyfikacja</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function formatBytes(bytes) {
    if (bytes < 1024) return `${bytes} B`;
    if (bytes < 1048576) return `${(bytes / 1024).toFixed(1)} KB`;
    return `${(bytes / 1048576).toFixed(1)} MB`;
  }

  async function triggerClose() {
    if (!confirm("Uruchomić pipeline zamknięcia miesiąca?")) return;
    const btn = document.getElementById("close-btn");
    const result = document.getElementById("close-result");
    btn.disabled = true;
    result.style.display = "none";

    const token = await getToken();
    if (!token) { btn.disabled = false; return; }

    try {
      const res = await fetch("/api/close", {
        method: "POST",
        headers: { Authorization: `Bearer ${token}` },
      });
      const data = await res.json().catch(() => ({}));
      result.style.display = "";
      if (res.ok) {
        result.className = "result-ok";
        result.textContent = `Uruchomiono: ${data.message || "OK"}`;
      } else {
        result.className = "result-err";
        result.textContent = `Błąd ${res.status}: ${data.detail || "nieznany błąd"}`;
      }
    } catch (e) {
      result.style.display = "";
      result.className = "result-err";
      result.textContent = `Błąd połączenia: ${e.message}`;
    } finally {
      btn.disabled = false;
    }
  }

  // ── Bootstrap ───────────────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
