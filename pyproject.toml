[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "zdrovena-reconciliation"
version = "2.0.0"
description = "Unified CLI for Fakturownia invoice audit, bottle tracking & month-close (Zdrovena/Humio)"
requires-python = ">=3.12"
dependencies = [
    "requests>=2.31.0",
    "keyring>=25.0.0",
    "xlrd>=2.0.1",
]

[project.optional-dependencies]
ksef = ["cryptography>=42.0.0", "signxml>=4.0.0", "lxml>=5.0.0"]
pdf = ["pypdf>=4.0.0", "pdf2image>=1.17.0"]
all = ["zdrovena-reconciliation[ksef,pdf]"]

[project.scripts]
zdrovena = "zdrovena.cli:main"

[tool.setuptools.packages.find]
include = ["zdrovena*"]
