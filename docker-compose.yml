# Local development environment
# Starts: Azurite (Azure Storage emulator) + FastAPI backend
# Frontend runs natively: cd frontend && npm run dev
#
# Usage:
#   docker compose up          # start all services
#   docker compose up -d       # start in background
#   docker compose down        # stop and remove containers
#
# After first start, seed the storage with test invoice files:
#   python3 scripts/seed-local-storage.py

services:

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.33.0
    container_name: zdrovena-azurite
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --loose --skipApiVersionCheck
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data
      - ./scripts/azurite-healthcheck.js:/healthcheck.js:ro
    healthcheck:
      test: ["CMD", "node", "/healthcheck.js"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: zdrovena-api
    ports:
      - "8000:8000"
    volumes:
      - ./zdrovena:/app/zdrovena
      - ./scripts:/app/scripts
      - faktury_data:/app/data/faktury
    env_file:
      - path: .env.local
        required: false
    environment:
      AZURE_AUTH_DISABLED: "true"
      PROVIDER_MODE: "${PROVIDER_MODE:-fake}"
      ALLEGRO_CLIENT_ID: "${ALLEGRO_CLIENT_ID:-fake}"
      ALLEGRO_CLIENT_SECRET: "${ALLEGRO_CLIENT_SECRET:-fake}"
      ALLEGRO_REFRESH_TOKEN: "${ALLEGRO_REFRESH_TOKEN:-fake}"
      ALLEGRO_BASE_URL: "http://fake-providers:9009/allegro"
      ALLEGRO_AUTH_URL: "http://fake-providers:9009/allegro/auth/oauth/token"
      INPOST_API_TOKEN: "${INPOST_API_TOKEN:-fake}"
      INPOST_ORGANIZATION_ID: "${INPOST_ORGANIZATION_ID:-fake}"
      INPOST_BASE_URL: "http://fake-providers:9009/inpost"
      APACZKA_APP_ID: "${APACZKA_APP_ID:-fake}"
      APACZKA_APP_SECRET: "${APACZKA_APP_SECRET:-fake}"
      APACZKA_BASE_URL: "http://fake-providers:9009/apaczka/api/v2"
      FAKTUROWNIA_BASE_URL: "http://fake-providers:9009/fakturownia"
      FAKTUROWNIA_BASE_DIR: "/app/data/faktury"
      FAKTUROWNIA_API_TOKEN: "${FAKTUROWNIA_API_TOKEN:-dev-placeholder}"
      KSEF_ENABLED: "false"
      MOCK_COURIER: "${MOCK_COURIER:-0}"
      AZURE_STORAGE_CONNECTION_STRING: >-
        DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
      AZURE_STORAGE_CONTAINER: "zdrovena-files"
    depends_on:
      azurite:
        condition: service_healthy
      fake-providers:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  fake-providers:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: zdrovena-fake-providers
    command: ["uvicorn", "zdrovena.fake_providers.app:app", "--reload", "--host", "0.0.0.0", "--port", "9009"]
    ports:
      - "9009:9009"
    volumes:
      - ./zdrovena:/app/zdrovena
    environment:
      APP_ENV: "development"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9009/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  azurite_data:
  faktury_data:
