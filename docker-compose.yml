# Local development environment
# Starts: Azurite (Azure Storage emulator) + FastAPI backend
# Frontend runs natively: cd frontend && npm run dev
#
# Usage:
#   docker compose up          # start all services
#   docker compose up -d       # start in background
#   docker compose down        # stop and remove containers
#
# After first start, seed the storage with test invoice files:
#   python3 scripts/seed-local-storage.py

services:

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.33.0
    container_name: zdrovena-azurite
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --loose --skipApiVersionCheck
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data
      - ./scripts/azurite-healthcheck.js:/healthcheck.js:ro
    healthcheck:
      test: ["CMD", "node", "/healthcheck.js"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: zdrovena-api
    ports:
      - "8000:8000"
    volumes:
      - ./zdrovena:/app/zdrovena
      - ./scripts:/app/scripts
      - faktury_data:/app/data/faktury
    env_file:
      - path: .env.local
        required: false
    environment:
      AZURE_AUTH_DISABLED: "true"
      FAKTUROWNIA_BASE_DIR: "/app/data/faktury"
      FAKTUROWNIA_API_TOKEN: "${FAKTUROWNIA_API_TOKEN:-dev-placeholder}"
      KSEF_ENABLED: "false"
      MOCK_COURIER: "${MOCK_COURIER:-0}"
      INPOST_COURIER_SERVICE: "${INPOST_COURIER_SERVICE:-inpost_courier_standard}"
      INPOST_TIMEOUT: "${INPOST_TIMEOUT:-15}"
      AZURE_STORAGE_CONNECTION_STRING: >-
        DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
      AZURE_STORAGE_CONTAINER: "zdrovena-files"
    depends_on:
      azurite:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  azurite_data:
  faktury_data:
