# Dependabot — weekly dependency updates grouped per ecosystem.
# Free for public + private repos. Auto-creates PRs to develop.
version: 2
updates:
  # GitHub Actions used in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    target-branch: "develop"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"

  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    target-branch: "develop"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      python-minor-and-patch:
        update-types: ["minor", "patch"]

  # Frontend npm dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    target-branch: "develop"
    commit-message:
      prefix: "chore(deps-fe)"
      include: "scope"
    groups:
      frontend-minor-and-patch:
        update-types: ["minor", "patch"]

  # E2E (Playwright) npm dependencies
  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    target-branch: "develop"
    commit-message:
      prefix: "chore(deps-e2e)"
    groups:
      e2e-minor-and-patch:
        update-types: ["minor", "patch"]

  # Smoke test runner npm dependencies
  - package-ecosystem: "npm"
    directory: "/scripts/smoke"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    target-branch: "develop"
    commit-message:
      prefix: "chore(deps-smoke)"
    groups:
      smoke-minor-and-patch:
        update-types: ["minor", "patch"]

  # Docker base image
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    target-branch: "develop"
    commit-message:
      prefix: "chore(docker)"

  # Terraform providers
  - package-ecosystem: "terraform"
    directory: "/infra/terraform"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    target-branch: "develop"
    commit-message:
      prefix: "chore(infra)"
