name: Frontend — Quality Gate

# Push to develop  → lint + audit only (no deploy)
# PR develop→main  → full test suite handles frontend deploy (see _full-test-suite.yml)
# Push to main     → production SWA deploy

on:
  push:
    branches: [develop, main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [develop]
    paths:
      - "frontend/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-gate:
    name: Quality gate (lint + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: ESLint
        working-directory: frontend
        run: npm run lint
      - name: npm audit (high+)
        working-directory: frontend
        run: npm audit --audit-level=high

  # Production deploy — push to main only
  # PR develop→main deploy is handled by _full-test-suite.yml
  deploy:
    name: Deploy to SWA (production)
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Generate version.json
        run: |
          API_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "//;s/"//')
          MAJOR=$(echo "$API_VERSION" | cut -d. -f1)
          cat > frontend/public/version.json <<EOF
          {
            "frontend_version": "$API_VERSION",
            "api_version": "$API_VERSION",
            "min_api_major": $MAJOR,
            "git_sha": "${{ github.sha }}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (production)
        working-directory: frontend
        env:
          VITE_AZURE_API_CLIENT_ID: ${{ secrets.AZURE_API_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: npm ci && npm run build

      - name: Deploy to SWA production
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ""
          skip_api_build: true
          skip_app_build: true

  close-pr-preview:
    name: Close PR preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: close
