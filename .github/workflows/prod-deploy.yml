name: Production Deploy

# Runtime changes pushed to main are deployed by area. Documentation, tests,
# CI helpers and unrelated workflows do not mutate production.

on:
  push:
    branches: [main]
    paths:
      - "zdrovena/**"
      - "pyproject.toml"
      - "Dockerfile"
      - "frontend/**"
  workflow_dispatch:

permissions:
  contents: write  # release job pushes version bump + creates GitHub Release
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect deployable areas
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    outputs:
      backend: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.backend_runtime }}
      frontend: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: .github/path-filters.yml

  deploy:
    name: Deploy
    needs: detect-changes
    uses: ./.github/workflows/_deploy.yml
    with:
      backend_changed: ${{ needs.detect-changes.outputs.backend == 'true' }}
      frontend_changed: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    secrets: inherit
