name: Release validation (long acceptance tests)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'  # 07:00 CEST (Mon–Sun)

jobs:
  acceptance:
    name: Full smoke suite (no exclusions)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: scripts/smoke/package-lock.json

      - name: Install smoke dependencies
        working-directory: scripts/smoke
        run: npm ci

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve staging URLs
        id: urls
        run: |
          set -euo pipefail

          API_FQDN=$(az containerapp show \
            --name zdrovena-api-staging \
            --resource-group zdrovena-rg \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          if [ -z "$API_FQDN" ]; then
            echo "::error::Nie udało się ustalić FQDN API stagingowego (Container App 'zdrovena-api-staging' w grupie 'zdrovena-rg'). Sprawdź, czy zasób istnieje." >&2
            exit 1
          fi

          # Uwaga: pusty SWA_URL psuł 6 testów smoke ('Failed to parse URL from ""')
          # — dawny '2>/dev/null || echo ""' cicho eksportował pustkę. Teraz przerywamy głośno.
          SWA_HOST=$(az staticwebapp show \
            --name zdrovena-frontend-staging \
            --resource-group zdrovena-rg \
            --query "defaultHostname" -o tsv)
          if [ -z "$SWA_HOST" ]; then
            echo "::error::Nie udało się ustalić hosta Static Web App stagingowego (SWA 'zdrovena-frontend-staging' w grupie 'zdrovena-rg'). Zasób nie istnieje lub zapytanie zwróciło pustkę — przerywam zamiast eksportować pusty SWA_URL." >&2
            exit 1
          fi

          echo "api-url=https://$API_FQDN" >> "$GITHUB_OUTPUT"
          echo "swa-url=https://$SWA_HOST" >> "$GITHUB_OUTPUT"

      - name: Warm up API (rozgrzewka cold-startu Container Apps)
        env:
          API_URL: ${{ steps.urls.outputs.api-url }}
        run: |
          set -uo pipefail
          # Container Apps skaluje do zera — pierwsze wywołanie /health potrafi trwać kilka
          # sekund i timeoutować w teście. Rozgrzewamy do 6 prób co 10 s (curl --max-time 15).
          for attempt in $(seq 1 6); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$API_URL/health" || echo "000")
            if [ "$code" = "200" ]; then
              echo "API gotowe (HTTP 200) po próbie $attempt/6."
              exit 0
            fi
            echo "Próba $attempt/6: /health zwróciło '$code' — czekam 10 s."
            [ "$attempt" -lt 6 ] && sleep 10
          done
          echo "::error::API nie odpowiedziało 200 na /health po 6 próbach — przerywam (strict: rozgrzewka bez HTTP 200 kończy się kodem niezerowym)."
          exit 1

      - name: Run full smoke suite
        working-directory: scripts/smoke
        env:
          API_URL: ${{ steps.urls.outputs.api-url }}
          SWA_URL: ${{ steps.urls.outputs.swa-url }}
          SMOKE_STRICT: "true"
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_API_CLIENT_ID: ${{ secrets.AZURE_API_CLIENT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          SMOKE_SP_CLIENT_ID: ${{ secrets.SMOKE_SP_CLIENT_ID }}
          SMOKE_SP_CLIENT_SECRET: ${{ secrets.SMOKE_SP_CLIENT_SECRET }}
          SMOKE_ACCOUNTANT_SP_CLIENT_ID: ${{ secrets.SMOKE_ACCOUNTANT_SP_CLIENT_ID }}
          SMOKE_ACCOUNTANT_SP_CLIENT_SECRET: ${{ secrets.SMOKE_ACCOUNTANT_SP_CLIENT_SECRET }}
        run: |
          npx tsx runner.ts --output report.json
          cat report.json | npx tsx -e "
            const r = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            process.exitCode = r.failed > 0 ? 1 : 0;
            console.log(\`Smoke: \${r.passed} pass, \${r.failed} fail, \${r.skipped} skip\`);
          "

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-validation-report
          path: scripts/smoke/report.json
