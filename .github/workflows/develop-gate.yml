name: Develop — Fast Gate

# Triggers:
#  - push to develop: runs lint, typecheck, unit tests, security, infra checks.
#  - pull_request → develop: same gate, validates contributions (incl. Dependabot)
#    before they land. No paths filter on PR — internal detect-changes job in
#    _quality-gate.yml handles per-area skipping, so the workflow always reports
#    a status (avoids "no checks reported" gap that blocks branch protection /
#    auto-merge for non-code PRs like dependabot.yml or workflow tweaks).
# No deploy, no staging. Target: under 5 minutes.

on:
  push:
    branches: [develop]
    paths:
      - "zdrovena/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "Dockerfile"
      - "e2e/**"
      - "frontend/**"
      - ".github/workflows/develop-gate.yml"
      - ".github/workflows/_quality-gate.yml"
  pull_request:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read
  id-token: write

concurrency:
  group: develop-gate-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  fast-gate:
    name: Fast gate
    uses: ./.github/workflows/_quality-gate.yml
    secrets: inherit
