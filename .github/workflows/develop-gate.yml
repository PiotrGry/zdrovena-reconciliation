name: Develop — Fast Gate

# Triggers:
#  - push to develop: runs lint, typecheck, unit tests, security, infra checks.
#  - pull_request → develop: same gate, validates contributions (incl. Dependabot)
#    before they land.
# The workflow itself always runs so branch protection receives a stable
# "Fast gate / Quality Gate" status. Area-specific jobs still skip through
# .github/path-filters.yml when their files did not change.
# No deploy, no staging. Target: under 5 minutes.

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read
  id-token: write

concurrency:
  group: develop-gate-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  fast-gate:
    name: Fast gate
    uses: ./.github/workflows/_quality-gate.yml
    secrets: inherit
