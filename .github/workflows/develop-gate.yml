name: Develop — Fast Gate

# Triggers:
#  - push to develop: runs lint, typecheck, unit tests, security, infra checks.
#  - pull_request → develop: same gate, validates contributions (incl. Dependabot)
#    before they land. Same paths filter as push — docs/infra-only PRs skip the
#    workflow entirely. Branch protection on develop must use "required status
#    checks" with "allow skipped" so docs-only PRs are not blocked.
# No deploy, no staging. Target: under 5 minutes.

on:
  push:
    branches: [develop]
    paths:
      - "zdrovena/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "Dockerfile"
      - "e2e/**"
      - "frontend/**"
      - "clusters/**"
      - ".sops.yaml"
      - ".sops.yaml.example"
      - "docs/devops/**"
      - ".github/workflows/develop-gate.yml"
      - ".github/workflows/_quality-gate.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read
  id-token: write

concurrency:
  group: develop-gate-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  fast-gate:
    name: Fast gate
    uses: ./.github/workflows/_quality-gate.yml
    secrets: inherit
