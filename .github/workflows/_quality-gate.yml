name: Quality Gate (reusable)

# Fast checks only — runs on every push to develop and every PR to main.
# No deploy, no staging, no docker push.
# Target: under 5 minutes.

on:
  workflow_call:

permissions:
  contents: read
  security-events: write
  pull-requests: read  # gitleaks needs to list PR commits, checkov lists PR files

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Typecheck (Pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,api,cloud,report,ksef,pdf]" pyright
      - run: pyright

  test:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,api,cloud]"
      - name: Run tests
        env:
          AZURE_AUTH_DISABLED: "true"
        run: |
          pytest tests/ -q --tb=short \
            --cov=zdrovena --cov-fail-under=80 \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junit-xml=test-results.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,api,cloud]" pip-audit "bandit[toml]"
      - run: pip-audit --ignore-vuln CVE-2026-3219  # pip itself, not a runtime dep
      - run: bandit -r zdrovena/ -ll -ii
      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  frontend-lint:
    name: Frontend lint + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Detect changed frontend files
        id: changed
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.changed.outputs.frontend == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        if: steps.changed.outputs.frontend == 'true'
        working-directory: frontend
        run: npm ci
      - name: ESLint
        if: steps.changed.outputs.frontend == 'true'
        working-directory: frontend
        run: npm run lint
      - name: npm audit (high+)
        if: steps.changed.outputs.frontend == 'true'
        working-directory: frontend
        run: npm audit --audit-level=high
      - if: steps.changed.outputs.frontend != 'true'
        run: echo "No frontend files changed, frontend checks skipped."

  infra:
    name: Terraform validate + Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Detect changed infra files
        id: changed
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        with:
          filters: |
            infra:
              - 'infra/terraform/**'
      - name: Setup Terraform
        if: steps.changed.outputs.infra == 'true'
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "~1.5"
      - name: Terraform init (no backend)
        if: steps.changed.outputs.infra == 'true'
        run: terraform -chdir=infra/terraform init -backend=false
      - name: Terraform validate
        if: steps.changed.outputs.infra == 'true'
        run: terraform -chdir=infra/terraform validate
      - name: Checkov IaC security scan
        if: steps.changed.outputs.infra == 'true'
        uses: bridgecrewio/checkov-action@3203f966a7ccd680cd8f6aaa3c3c5b0b3e9afa32 # v12
        with:
          directory: infra/terraform
          quiet: true
          soft_fail: false
      - if: steps.changed.outputs.infra != 'true'
        run: echo "No terraform files changed, infra checks skipped."
