name: Quality Gate (reusable)

# Fast checks only — runs on every push to develop and every PR to main.
# No deploy, no staging, no docker push.
# Target: under 5 minutes.
#
# Per-area gating: detect-changes job decides which areas (backend / frontend /
# infra) actually changed; downstream jobs skip if their area didn't change.
# This keeps frontend-only commits from running the full Python test suite.

on:
  workflow_call:
    outputs:
      backend:
        description: "True if backend Python code changed"
        value: ${{ jobs.detect-changes.outputs.backend }}
      frontend:
        description: "True if frontend code changed"
        value: ${{ jobs.detect-changes.outputs.frontend }}
      infra:
        description: "True if Terraform code changed"
        value: ${{ jobs.detect-changes.outputs.infra }}

permissions:
  contents: read
  security-events: write
  pull-requests: read  # gitleaks needs to list PR commits, checkov lists PR files

jobs:
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        with:
          filters: |
            backend:
              - 'zdrovena/**'
              - 'tests/**'
              - 'scripts/**'
              - 'pyproject.toml'
              - 'Dockerfile'
            frontend:
              - 'frontend/**'
            infra:
              - 'infra/terraform/**'

  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Typecheck (Pyright)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,api,cloud,report,ksef,pdf]" pyright
      - run: pyright

  test:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,api,cloud]"
      - name: Run tests
        env:
          AZURE_AUTH_DISABLED: "true"
        run: |
          pytest tests/ -q --tb=short \
            --cov=zdrovena --cov-fail-under=80 \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junit-xml=test-results.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: needs.detect-changes.outputs.backend == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,api,cloud]" pip-audit "bandit[toml]"
      - run: pip-audit --ignore-vuln CVE-2026-3219  # pip itself, not a runtime dep
      - run: bandit -r zdrovena/ -ll -ii
      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  frontend-lint:
    name: Frontend lint + audit
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: ESLint
        working-directory: frontend
        run: npm run lint
      - name: npm audit (high+)
        working-directory: frontend
        run: npm audit --audit-level=high

  infra:
    name: Terraform validate + Checkov
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.9.8"
      - name: Terraform init (no backend)
        run: terraform -chdir=infra/terraform init -backend=false -lock-timeout=5m
      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate
      - name: Checkov IaC security scan
        uses: bridgecrewio/checkov-action@3203f966a7ccd680cd8f6aaa3c3c5b0b3e9afa32 # v12
        with:
          directory: infra/terraform
          quiet: true
          soft_fail: false
