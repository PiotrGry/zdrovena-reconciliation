name: Quality Gate (reusable)

# Fast checks only — runs on every push to develop and every PR to main.
# No deploy, no staging, no docker push.
# Target: under 5 minutes.
#
# Per-area gating: detect-changes job decides which areas (backend / frontend /
# infra) actually changed; downstream jobs skip if their area didn't change.
# This keeps frontend-only commits from running the full Python test suite.

on:
  workflow_call:
    outputs:
      backend:
        description: "True if backend Python code changed"
        value: ${{ jobs.detect-changes.outputs.backend }}
      frontend:
        description: "True if frontend code changed"
        value: ${{ jobs.detect-changes.outputs.frontend }}
      infra:
        description: "True if Terraform code changed"
        value: ${{ jobs.detect-changes.outputs.infra }}

permissions:
  contents: read
  security-events: write
  pull-requests: read  # gitleaks needs to list PR commits, checkov lists PR files

jobs:
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: .github/path-filters.yml

  typecheck:
    name: Typecheck (Pyright)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,api,cloud,report,ksef,pdf]" pyright
      - run: ruff check .
      - run: ruff format --check .
      - run: pyright
      - run: pytest tests/ -q --tb=short --cov=zdrovena --cov-fail-under=80

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.backend == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --upgrade pip  # CVE-2026-3219, CVE-2026-6357 fixed in pip>=26.1
      - run: pip install -e ".[dev,api,cloud]" pip-audit "bandit[toml]"
      - run: |
          pip-audit \
            --ignore-vuln PYSEC-2026-89 \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln PYSEC-2026-196 \
            --ignore-vuln PYSEC-2026-237 \
            --ignore-vuln CVE-2026-34993 \
            --ignore-vuln CVE-2026-47265 \
            --ignore-vuln CVE-2026-54273 \
            --ignore-vuln CVE-2026-54279 \
            --ignore-vuln CVE-2026-54277 \
            --ignore-vuln CVE-2026-50269 \
            --ignore-vuln CVE-2026-54276 \
            --ignore-vuln CVE-2026-54278 \
            --ignore-vuln CVE-2026-54280 \
            --ignore-vuln CVE-2026-54274 \
            --ignore-vuln PYSEC-2022-260 \
            --ignore-vuln CVE-2026-40087 \
            --ignore-vuln CVE-2026-44843 \
            --ignore-vuln CVE-2026-48775 \
            --ignore-vuln CVE-2026-48776 \
            --ignore-vuln CVE-2026-41182 \
            --ignore-vuln CVE-2026-45134 \
            --ignore-vuln GHSA-f4xh-w4cj-qxq8
      - run: bandit -r zdrovena/ -ll -ii
      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-
      - name: trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  infra:
    name: Terraform validate + Checkov
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "1.9.8"
      - name: Terraform init (no backend)
        run: terraform -chdir=infra/terraform init -backend=false -lock-timeout=5m
      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate
      - name: Checkov IaC security scan
        uses: bridgecrewio/checkov-action@20fb358293b0af0188f25cf7658b69d49ec12c9a # v12
        with:
          directory: infra/terraform
          quiet: true
          soft_fail: false

  frontend-check:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci && npm run lint && npm run build
