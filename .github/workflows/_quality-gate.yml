name: Quality Gate (reusable)

# Fast checks only — runs on every push to develop and every PR to main.
# No deploy, no staging, no docker push.
# Target: under 5 minutes.
#
# Per-area gating: detect-changes job decides which areas (backend / frontend /
# infra) actually changed; downstream jobs skip if their area didn't change.
# This keeps frontend-only commits from running the full Python test suite.

on:
  workflow_call:
    outputs:
      backend:
        description: "True if backend Python code changed"
        value: ${{ jobs.detect-changes.outputs.backend }}
      frontend:
        description: "True if frontend code changed"
        value: ${{ jobs.detect-changes.outputs.frontend }}
      infra:
        description: "True if Terraform code changed"
        value: ${{ jobs.detect-changes.outputs.infra }}

permissions:
  contents: read
  security-events: write
  pull-requests: read  # gitleaks needs to list PR commits, checkov lists PR files

jobs:
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: .github/path-filters.yml

  sops-guard:
    name: SOPS age guard
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: scripts/check-sops-secrets.sh

  typecheck:
    name: Typecheck (Pyright)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,api,cloud,report,ksef,pdf]" pyright
      - run: ruff check .
      - run: ruff format --check .
      - run: pyright
      - run: pytest tests/ -q --tb=short --cov=zdrovena --cov-fail-under=80

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.backend == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --upgrade pip  # CVE-2026-3219, CVE-2026-6357 fixed in pip>=26.1
      - run: pip install -e ".[dev,api,cloud]" pip-audit "bandit[toml]"
      - run: |
          pip-audit \
            --ignore-vuln PYSEC-2026-89 \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln PYSEC-2026-196 \
            --ignore-vuln PYSEC-2026-237 \
            --ignore-vuln CVE-2026-34993 \
            --ignore-vuln CVE-2026-47265 \
            --ignore-vuln CVE-2026-54273 \
            --ignore-vuln CVE-2026-54279 \
            --ignore-vuln CVE-2026-54277 \
            --ignore-vuln CVE-2026-50269 \
            --ignore-vuln CVE-2026-54276 \
            --ignore-vuln CVE-2026-54278 \
            --ignore-vuln CVE-2026-54280 \
            --ignore-vuln CVE-2026-54274 \
            --ignore-vuln PYSEC-2022-260 \
            --ignore-vuln CVE-2026-40087 \
            --ignore-vuln CVE-2026-44843 \
            --ignore-vuln CVE-2026-48775 \
            --ignore-vuln CVE-2026-48776 \
            --ignore-vuln CVE-2026-41182 \
            --ignore-vuln CVE-2026-45134 \
            --ignore-vuln GHSA-f4xh-w4cj-qxq8
      - run: bandit -r zdrovena/ -ll -ii
      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-
      - name: trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  api-contracts:
    name: OpenAPI contract drift
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: pip install -e ".[api,cloud,report,ksef,pdf]"
      - working-directory: frontend
        run: npm ci
      - run: scripts/check-api-contracts.sh
      - working-directory: frontend
        run: npm run check:api-types

  infra:
    name: Terraform validate + Checkov
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.9.8"
      - name: Terraform init (no backend)
        run: terraform -chdir=infra/terraform init -backend=false -lock-timeout=5m
      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate
      - name: Checkov IaC security scan
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12
        with:
          directory: infra/terraform
          quiet: true
          soft_fail: false

  frontend-check:
    name: Frontend lint + test + build
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci && npm run lint && npm test && npm run build
