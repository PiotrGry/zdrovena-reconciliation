name: Quality Gate (reusable)

on:
  workflow_call:

permissions:
  contents: read
  security-events: write  # trivy SARIF upload

jobs:
  lint:
    name: Ruff lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check lint
        run: ruff check .

      - name: Check format
        run: ruff format --check .

  typecheck:
    name: Pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,api,cloud,report,ksef,pdf]" pyright

      - name: Run Pyright
        run: pyright

  test:
    name: "pytest + coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,api,cloud]"

      - name: Run tests with coverage
        env:
          AZURE_AUTH_DISABLED: "true"
        run: |
          pytest tests/ -q --tb=short \
            --cov=zdrovena --cov-fail-under=80 \
            --cov-report=term-missing

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project + security tools
        run: |
          pip install -e ".[dev,api,cloud]"
          pip install pip-audit bandit[toml]

      - name: pip-audit — dependency CVE scan
        run: pip-audit

      - name: bandit — SAST (Python source)
        run: bandit -r zdrovena/ -ll -ii

      - name: gitleaks — secret leak scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: trivy — filesystem CVE scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  fitness:
    name: Fitness Functions (arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run module boundary tests
        run: pytest tests/fitness/ -v

  infra:
    name: Terraform validate + Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed infra files
        id: changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - 'infra/terraform/**'

      - name: Setup Terraform
        if: steps.changed.outputs.infra == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform init (no backend)
        if: steps.changed.outputs.infra == 'true'
        run: terraform -chdir=infra/terraform init -backend=false

      - name: Terraform validate
        if: steps.changed.outputs.infra == 'true'
        run: terraform -chdir=infra/terraform validate

      - name: Checkov IaC security scan
        if: steps.changed.outputs.infra == 'true'
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform
          quiet: true
          soft_fail: false

      - name: No infra changes — skipped
        if: steps.changed.outputs.infra != 'true'
        run: echo "No terraform files changed, infra checks skipped."

  # PR→develop: waliduje Dockerfile lokalnie, brak push — szybka pętla feedbacku.
  # PR→main: pomijany — staging-smoke buduje i pushuje do ACR (build-once).
  docker-build:
    name: Docker build (validate)
    if: github.base_ref == 'develop'
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Build image (no push)
        run: |
          docker build \
            --label "git.sha=${{ github.sha }}" \
            -t zdrovena-api:ci-${{ github.sha }} \
            .

  # PR→main only: verify staging SWA has real auth config baked in.
  # Catches VITE_ env vars not injected at build time before anything hits prod.
  frontend-smoke:
    name: Frontend smoke — staging auth config
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Check staging app loads
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://icy-water-0e2b04d03-staging.7.azurestaticapps.net")
          echo "HTTP: $HTTP"
          [ "$HTTP" = "200" ] || (echo "FAIL: staging returned $HTTP" && exit 1)

      - name: Check tenant GUID baked into JS bundle
        run: |
          BASE="https://icy-water-0e2b04d03-staging.7.azurestaticapps.net"
          BUNDLE=$(curl -s --max-time 15 "$BASE" \
            | grep -o 'src="/assets/[^"]*\.js"' | head -1 \
            | sed 's/src="//;s/"//')
          echo "Bundle: $BUNDLE"
          [ -n "$BUNDLE" ] || (echo "FAIL: no JS bundle in HTML" && exit 1)
          CONTENT=$(curl -s --max-time 20 "$BASE$BUNDLE")
          if echo "$CONTENT" | grep -q 'microsoftonline\.com/undefined'; then
            echo "FAIL: VITE_AZURE_TENANT_ID=undefined in bundle"
            exit 1
          fi
          if ! echo "$CONTENT" | grep -qE 'microsoftonline\.com/[0-9a-f]{8}-[0-9a-f]{4}'; then
            echo "FAIL: no tenant GUID in authority — check AZURE_TENANT_ID secret"
            exit 1
          fi
          echo "PASS: tenant GUID present in bundle"

      - name: Check API client ID baked into JS bundle
        run: |
          BASE="https://icy-water-0e2b04d03-staging.7.azurestaticapps.net"
          BUNDLE=$(curl -s --max-time 15 "$BASE" \
            | grep -o 'src="/assets/[^"]*\.js"' | head -1 \
            | sed 's/src="//;s/"//')
          CONTENT=$(curl -s --max-time 20 "$BASE$BUNDLE")
          if echo "$CONTENT" | grep -q 'api://undefined'; then
            echo "FAIL: VITE_AZURE_API_CLIENT_ID=undefined in bundle"
            exit 1
          fi
          echo "PASS: API client ID present in bundle"
