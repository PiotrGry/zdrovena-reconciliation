name: Quality Gate (reusable)

# Fast checks only — runs on every push to develop and every PR to main.
# No deploy, no staging, no docker push.
# Target: under 5 minutes.
#
# Per-area gating: detect-changes job decides which areas (backend / frontend /
# infra) actually changed; downstream jobs skip if their area didn't change.
# This keeps frontend-only commits from running the full Python test suite.

on:
  workflow_call:
    outputs:
      backend:
        description: "True if backend Python code changed"
        value: ${{ jobs.detect-changes.outputs.backend }}
      frontend:
        description: "True if frontend code changed"
        value: ${{ jobs.detect-changes.outputs.frontend }}
      infra:
        description: "True if Terraform code changed"
        value: ${{ jobs.detect-changes.outputs.infra }}

permissions:
  contents: read
  security-events: write
  pull-requests: read  # gitleaks needs to list PR commits, checkov lists PR files

jobs:
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            backend:
              - 'zdrovena/**'
              - 'tests/**'
              - 'scripts/**'
              - 'pyproject.toml'
              - 'Dockerfile'
            frontend:
              - 'frontend/**'
            infra:
              - 'infra/terraform/**'

  typecheck:
    name: Typecheck (Pyright)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,api,cloud,report,ksef,pdf]" pyright
      - run: pyright

  test:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,api,cloud]"
      - name: Run tests
        env:
          AZURE_AUTH_DISABLED: "true"
        run: |
          pytest tests/ -q --tb=short \
            --cov=zdrovena --cov-fail-under=80 \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junit-xml=test-results.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: needs.detect-changes.outputs.backend == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,api,cloud]" pip-audit "bandit[toml]"
      - run: pip-audit --ignore-vuln CVE-2026-3219  # pip itself, not a runtime dep
      - run: bandit -r zdrovena/ -ll -ii
      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  infra:
    name: Terraform validate + Checkov
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "1.9.8"
      - name: Terraform init (no backend)
        run: terraform -chdir=infra/terraform init -backend=false -lock-timeout=5m
      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate
      - name: Checkov IaC security scan
        uses: bridgecrewio/checkov-action@4048c972aae68d0b983a48bb3479aab2d877b898 # v12
        with:
          directory: infra/terraform
          quiet: true
          soft_fail: false
