name: Full Test Suite (reusable)

# Runs only on PR develop→main.
# Stages:
#   1. Build Docker image + push to staging tag
#   2. Deploy backend to staging Container App
#   3. Build + deploy frontend to SWA staging (with real VITE_ vars)
#   4. Run extensible smoke test suite (TypeScript runner)
#   5. Run E2E tests (Playwright) against staging
#   6. PR summary comment
#   7. Teardown staging
#
# Gate: all stages must pass — ci-gate in ci-cd.yml blocks merge on failure.

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  # ── 1. Build and push staging image ───────────────────────────────────────
  build:
    name: Build & push staging image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build & push
        id: meta
        env:
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/zdrovena-api
        run: |
          docker build \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.head_ref }}" \
            -t "$IMAGE:staging-${{ github.sha }}" \
            .
          docker push "$IMAGE:staging-${{ github.sha }}"
          docker tag  "$IMAGE:staging-${{ github.sha }}" "$IMAGE:staging-latest"
          docker push "$IMAGE:staging-latest"
          echo "image=$IMAGE:staging-${{ github.sha }}" >> $GITHUB_OUTPUT

  # ── 2. Deploy backend to staging ──────────────────────────────────────────
  deploy-backend:
    name: Deploy backend to staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging
    needs: build
    env:
      STAGING_APP: zdrovena-api-staging
      RG: zdrovena-rg
    outputs:
      api-url: ${{ steps.url.outputs.url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to staging Container App
        run: |
          az containerapp update \
            --name            "$STAGING_APP" \
            --resource-group  "$RG" \
            --image           "${{ secrets.ACR_LOGIN_SERVER }}/zdrovena-api:staging-${{ github.sha }}" \
            --min-replicas    1

      - name: Wait for deployment
        run: bash scripts/ci/wait-containerapp.sh "$STAGING_APP" "$RG" 36 10

      - name: Get staging API URL
        id: url
        run: |
          FQDN=$(az containerapp show \
            --name "$STAGING_APP" --resource-group "$RG" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=https://$FQDN" >> $GITHUB_OUTPUT
          echo "Staging API: https://$FQDN"

  # ── 3. Deploy frontend to SWA staging ─────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to SWA staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # `environment: staging` is required so the OIDC token's subject claim is
    # repo:.../zdrovena-reconciliation:environment:staging — matching the
    # `github-staging` federated identity credential on the gha SP. Without it,
    # the subject becomes `:pull_request` on PR runs and AAD rejects the login
    # with AADSTS700213 (no matching federated identity).
    environment: staging
    needs: build
    outputs:
      # SWA action creates env named after PR number (e.g. 47 → icy-water-0e2b04d03-47.westeurope.7.azurestaticapps.net)
      swa-url: "https://icy-water-0e2b04d03-${{ github.event.pull_request.number }}.westeurope.7.azurestaticapps.net"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (staging)
        working-directory: frontend
        env:
          VITE_AZURE_API_CLIENT_ID: ${{ secrets.AZURE_STAGING_API_CLIENT_ID || secrets.AZURE_API_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: npm ci && npm run build

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Fetch SWA deployment token via OIDC instead of storing as a long-lived
      # GitHub secret. The static-web-apps-deploy action requires an API token,
      # but we acquire it just-in-time using the federated SP credentials.
      - name: Fetch SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ secrets.AZURE_SWA_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query properties.apiKey -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to SWA staging
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ""
          skip_app_build: true

  # ── 4. Seed staging storage with test invoice files ──────────────────────
  seed-staging:
    name: Seed staging inbox
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: staging
    needs: [deploy-backend, deploy-frontend]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install "azure-storage-blob>=12.19.0" "azure-identity>=1.16.0"

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Seed staging inbox with test invoices
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          ACCOUNT=$(az storage account list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "[0].name" -o tsv)
          echo "Storage account: $ACCOUNT"

          NOW=$(date -u +"%Y-%m")
          YEAR=${NOW%-*}
          MONTH_NUM=$(date -u +"%m" | sed 's/^0//')
          PREV_MONTH=$(( MONTH_NUM == 1 ? 12 : MONTH_NUM - 1 ))
          PREV_YEAR=$(( MONTH_NUM == 1 ? YEAR - 1 : YEAR ))
          echo "Seeding staging inbox for ${PREV_YEAR}/${PREV_MONTH}..."

          # Clear existing inbox files
          az storage blob delete-batch \
            --account-name "$ACCOUNT" \
            --source zdrovena-files-staging \
            --pattern "faktury/inbox/*" \
            --auth-mode login 2>/dev/null || true

          # Generate fake files and upload via az CLI (uses OIDC token directly)
          TMPDIR=$(mktemp -d)
          FAKE_PDF='%PDF-1.4 seed'
          FAKE_XML='<?xml version="1.0" encoding="UTF-8"?><root><test>seed</test></root>'

          if [ "$PREV_MONTH" -eq 12 ]; then NEXT_MONTH=1; NEXT_YEAR=$((PREV_YEAR+1)); else NEXT_MONTH=$((PREV_MONTH+1)); NEXT_YEAR=$PREV_YEAR; fi
          BANK_DATE=$(printf "%04d%02d01" "$NEXT_YEAR" "$NEXT_MONTH")
          MONTH_PAD=$(printf "%02d" "$PREV_MONTH")

          echo "$FAKE_PDF" > "$TMPDIR/Wyciag_na_zadanie_${BANK_DATE}001.pdf"
          echo "$FAKE_PDF" > "$TMPDIR/invoice-12345-${PREV_YEAR}${MONTH_PAD}15.pdf"
          echo "$FAKE_PDF" > "$TMPDIR/3849995102.pdf"
          echo "$FAKE_XML" > "$TMPDIR/zdrovena-${PREV_YEAR}-${MONTH_PAD}-01-jpk_fa.xml"
          echo "$FAKE_XML" > "$TMPDIR/zdrovena-${PREV_YEAR}-${MONTH_PAD}-01-jpkv7m.xml"
          echo "$FAKE_PDF" > "$TMPDIR/zdrovena-${PREV_YEAR}-${MONTH_PAD}-01_wykaz_sprzedazy.pdf"

          az storage blob upload-batch \
            --account-name "$ACCOUNT" \
            --destination zdrovena-files-staging \
            --destination-path "faktury/inbox" \
            --source "$TMPDIR" \
            --auth-mode login
          rm -rf "$TMPDIR"
          echo "Seeded 6 files to zdrovena-files-staging/faktury/inbox/"

  # ── 5. Smoke test suite ────────────────────────────────────────────────────
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [deploy-backend, deploy-frontend, seed-staging]
    outputs:
      result: ${{ steps.run.outputs.result }}
      report: ${{ steps.run.outputs.report }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: scripts/smoke/package-lock.json

      - name: Install smoke test dependencies
        working-directory: scripts/smoke
        run: npm ci

      - name: Run smoke test suite
        id: run
        env:
          API_URL: ${{ needs.deploy-backend.outputs.api-url }}
          SWA_URL: ${{ needs.deploy-frontend.outputs.swa-url }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_API_CLIENT_ID: ${{ secrets.AZURE_API_CLIENT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          SMOKE_SP_CLIENT_ID: ${{ secrets.SMOKE_SP_CLIENT_ID }}
          SMOKE_SP_CLIENT_SECRET: ${{ secrets.SMOKE_SP_CLIENT_SECRET }}
          SMOKE_ACCOUNTANT_SP_CLIENT_ID: ${{ secrets.SMOKE_ACCOUNTANT_SP_CLIENT_ID }}
          SMOKE_ACCOUNTANT_SP_CLIENT_SECRET: ${{ secrets.SMOKE_ACCOUNTANT_SP_CLIENT_SECRET }}
        run: |
          cd scripts/smoke
          npx tsx runner.ts --output report.json
          RESULT=$(cat report.json | npx tsx -e "
            const r = JSON.parse(require('fs').readFileSync('report.json','utf8'));
            const failed = r.tests.filter(t => t.status === 'FAIL').length;
            console.log(failed === 0 ? 'PASS' : 'FAIL');
          ")
          echo "result=$RESULT" >> $GITHUB_OUTPUT
          REPORT=$(cat report.json | tr -d '\n')
          echo "report=$REPORT" >> $GITHUB_OUTPUT

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-report
          path: scripts/smoke/report.json

  # ── 5. E2E tests (Playwright) ─────────────────────────────────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [deploy-backend, deploy-frontend, seed-staging]
    outputs:
      result: ${{ steps.run.outputs.result }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright
        working-directory: e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run E2E tests
        id: run
        env:
          BASE_URL: ${{ needs.deploy-frontend.outputs.swa-url }}
          API_URL: ${{ needs.deploy-backend.outputs.api-url }}
        run: |
          cd e2e
          npx playwright test --reporter=json,list 2>&1 | tee e2e-results.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "result=$([ $EXIT_CODE -eq 0 ] && echo PASS || echo FAIL)" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-results
          path: |
            e2e/e2e-results.txt
            e2e/playwright-report/

  # ── 6. AI verdict ─────────────────────────────────────────────────────────

  # ── 6. PR summary comment ─────────────────────────────────────────────────
  pr-summary:
    name: Post PR summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [smoke, e2e]
    if: always()
    steps:
      - name: Post result comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const smokeResult = '${{ needs.smoke.outputs.result }}';
            const e2eResult   = '${{ needs.e2e.outputs.result }}';
            const allPass     = smokeResult === 'PASS' && e2eResult === 'PASS';
            const icon        = allPass ? '✅' : '❌';

            const body = `## ${icon} Test Suite: ${allPass ? 'PASS' : 'FAIL'}

            | Check | Result |
            |-------|--------|
            | Smoke tests | ${smokeResult === 'PASS' ? '✅ PASS' : '❌ FAIL'} |
            | E2E tests   | ${e2eResult   === 'PASS' ? '✅ PASS' : '❌ FAIL'} |

            <sub>Commit: \`${{ github.sha }}\` · [Artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('Test Suite'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number, body,
              });
            }

  teardown:
    name: Teardown staging
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [smoke, e2e]
    if: always()
    environment: staging
    env:
      STAGING_APP: zdrovena-api-staging
      RG: zdrovena-rg
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Scale staging to zero
        run: bash scripts/ci/teardown-staging.sh "$STAGING_APP" "$RG"

      - name: Delete SWA staging environment
        env:
          SWA_NAME: ${{ secrets.AZURE_SWA_NAME }}
          SWA_RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          az staticwebapp environment delete \
            --name "$SWA_NAME" \
            --resource-group "$SWA_RG" \
            --environment-name "$PR_NUM" \
            --yes 2>/dev/null || echo "SWA env $PR_NUM already gone or not found — OK"
