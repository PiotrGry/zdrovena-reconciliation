name: Full Test Suite (reusable)

# Runs only on PR develop→main.
# Stages:
#   1. Build Docker image + push to staging tag
#   2. Deploy backend to staging Container App
#   3. Build + deploy frontend to SWA staging (with real VITE_ vars)
#   4. Run extensible smoke test suite (TypeScript runner)
#   5. Run E2E tests (Playwright) against staging
#   6. PR summary comment
#   7. Teardown staging
#
# Gate: all stages must pass — ci-gate in ci-cd.yml blocks merge on failure.

on:
  workflow_call:
    inputs:
      backend_changed:
        description: "True if backend code changed (from quality-gate detect-changes)"
        type: string
        default: ""
      frontend_changed:
        description: "True if frontend code changed (from quality-gate detect-changes)"
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  # ── 0. Detect changed areas ────────────────────────────────────────────────
  # When called from pr-validate, inputs are pre-computed by quality-gate to
  # avoid running dorny/paths-filter twice on the same SHA.
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ inputs.backend_changed != '' && inputs.backend_changed || steps.filter.outputs.backend }}
      frontend: ${{ inputs.frontend_changed != '' && inputs.frontend_changed || steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - if: inputs.backend_changed == ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - if: inputs.backend_changed == ''
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: .github/path-filters.yml

  # ── W. Warm up staging Container App ─────────────────────────────────────
  # Runs in parallel with build — ensures staging is at min 1 replica so smoke
  # tests don't hit a cold-start 503 when backend didn't change (deploy skipped).
  warm-staging:
    name: Warm up staging
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: staging
    needs: detect-changes
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Scale to min 1 replica
        run: |
          az containerapp update \
            --name zdrovena-api-staging \
            --resource-group zdrovena-rg \
            --min-replicas 1 \
            --max-replicas 3
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Wait for health
        run: bash scripts/ci/wait-containerapp.sh zdrovena-api-staging zdrovena-rg 12 10

  # ── 1. Build and push staging image ───────────────────────────────────────
  build:
    name: Build & push staging image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build & push
        id: meta
        env:
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/zdrovena-api
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.head_ref }}" \
            -t "$IMAGE:staging-${{ github.sha }}" \
            -t "$IMAGE:staging-latest" \
            --push \
            .
          echo "image=$IMAGE:staging-${{ github.sha }}" >> $GITHUB_OUTPUT

  # ── 2. Deploy backend to staging ──────────────────────────────────────────
  deploy-backend:
    name: Deploy backend to staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.backend == 'true'
    env:
      STAGING_APP: zdrovena-api-staging
      RG: zdrovena-rg
    outputs:
      api-url: ${{ steps.url.outputs.url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to staging Container App
        run: |
          az containerapp update \
            --name            "$STAGING_APP" \
            --resource-group  "$RG" \
            --image           "${{ secrets.ACR_LOGIN_SERVER }}/zdrovena-api:staging-${{ github.sha }}" \
            --min-replicas    1

      - name: Wait for deployment
        run: bash scripts/ci/wait-containerapp.sh "$STAGING_APP" "$RG" 36 10

      - name: Get staging API URL
        id: url
        run: |
          FQDN=$(az containerapp show \
            --name "$STAGING_APP" --resource-group "$RG" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=https://$FQDN" >> $GITHUB_OUTPUT
          echo "Staging API: https://$FQDN"

  # ── 3. Deploy frontend to SWA staging ─────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to SWA staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # `environment: staging` is required so the OIDC token's subject claim is
    # repo:.../zdrovena-reconciliation:environment:staging — matching the
    # `github-staging` federated identity credential on the gha SP. Without it,
    # the subject becomes `:pull_request` on PR runs and AAD rejects the login
    # with AADSTS700213 (no matching federated identity).
    environment: staging
    needs: [detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true'
    outputs:
      # SWA action creates env named after PR number (e.g. 47 → icy-water-0e2b04d03-47.westeurope.7.azurestaticapps.net)
      swa-url: "https://icy-water-0e2b04d03-${{ github.event.pull_request.number }}.westeurope.7.azurestaticapps.net"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (staging)
        working-directory: frontend
        env:
          VITE_AZURE_API_CLIENT_ID: ${{ secrets.AZURE_STAGING_API_CLIENT_ID || secrets.AZURE_API_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: npm ci && npm run build

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Fetch SWA deployment token via OIDC instead of storing as a long-lived
      # GitHub secret. The static-web-apps-deploy action requires an API token,
      # but we acquire it just-in-time using the federated SP credentials.
      - name: Fetch SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ secrets.AZURE_SWA_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query properties.apiKey -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to SWA staging
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ""
          skip_app_build: true

  # ── 3b. Resolve staging URLs (no az login needed — staging FQDN is static) ──
  resolve-urls:
    name: Resolve staging URLs
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [detect-changes, deploy-backend, deploy-frontend]
    if: always() && !failure() && !cancelled()
    outputs:
      api-url: ${{ steps.urls.outputs.api_url }}
      swa-url: ${{ steps.urls.outputs.swa_url }}
    steps:
      - name: Resolve URLs
        id: urls
        run: |
          # staging FQDN is static — no az login required
          if [[ "${{ needs.deploy-backend.result }}" == "success" ]]; then
            API_URL="${{ needs.deploy-backend.outputs.api-url }}"
          else
            API_URL="https://${{ secrets.STAGING_API_FQDN }}"
          fi
          if [[ "${{ needs.deploy-frontend.result }}" == "success" ]]; then
            SWA_URL="${{ needs.deploy-frontend.outputs.swa-url }}"
          else
            SWA_URL="https://icy-water-0e2b04d03-${{ github.event.pull_request.number }}.westeurope.7.azurestaticapps.net"
          fi
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "swa_url=$SWA_URL" >> $GITHUB_OUTPUT

  # ── 4. Seed staging storage with test invoice files ──────────────────────
  seed-staging:
    name: Seed staging inbox
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: staging
    needs: [resolve-urls, warm-staging]
    if: always() && needs.resolve-urls.result == 'success' && needs.warm-staging.result != 'failure'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install "azure-storage-blob>=12.19.0" "azure-identity>=1.16.0"

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Seed staging inbox with test invoices
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_STORAGE_ACCOUNT: zdrovenafiles
        run: bash scripts/ci/seed-staging.sh

  # ── 5. Smoke test suite ────────────────────────────────────────────────────
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [resolve-urls, seed-staging]
    if: always() && needs.resolve-urls.result == 'success' && needs.seed-staging.result == 'success'
    outputs:
      result: ${{ steps.run.outputs.result }}
      report: ${{ steps.run.outputs.report }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: scripts/smoke/package-lock.json

      - name: Install smoke test dependencies
        working-directory: scripts/smoke
        run: npm ci

      - name: Run smoke test suite
        id: run
        env:
          API_URL: ${{ needs.resolve-urls.outputs.api-url }}
          SWA_URL: ${{ needs.resolve-urls.outputs.swa-url }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_API_CLIENT_ID: ${{ secrets.AZURE_API_CLIENT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          SMOKE_SP_CLIENT_ID: ${{ secrets.SMOKE_SP_CLIENT_ID }}
          SMOKE_SP_CLIENT_SECRET: ${{ secrets.SMOKE_SP_CLIENT_SECRET }}
          # zdrovena-smoke-tester has both viewer and accountant roles — reuse same SP
          SMOKE_ACCOUNTANT_SP_CLIENT_ID: ${{ secrets.SMOKE_ACCOUNTANT_SP_CLIENT_ID }}
          SMOKE_ACCOUNTANT_SP_CLIENT_SECRET: ${{ secrets.SMOKE_ACCOUNTANT_SP_CLIENT_SECRET }}
        run: |
          cd scripts/smoke
          npx tsx runner.ts --output report.json --exclude-test=closeDetailedVendorAndZipReport
          RESULT=$(cat report.json | npx tsx -e "
            const r = JSON.parse(require('fs').readFileSync('report.json','utf8'));
            const failed = r.tests.filter(t => t.status === 'FAIL').length;
            console.log(failed === 0 ? 'PASS' : 'FAIL');
          ")
          echo "result=$RESULT" >> $GITHUB_OUTPUT
          REPORT=$(cat report.json | tr -d '\n')
          echo "report=$REPORT" >> $GITHUB_OUTPUT

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-report
          path: scripts/smoke/report.json

  # ── 5. E2E tests (Playwright) ─────────────────────────────────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [resolve-urls, seed-staging]
    if: always() && needs.resolve-urls.result == 'success' && needs.seed-staging.result == 'success'
    outputs:
      result: ${{ steps.run.outputs.result }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
      - name: Install Playwright
        working-directory: e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Azure login (OIDC) — for Key Vault access
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch smoke credentials from Key Vault
        id: kv
        run: |
          CID=$(az keyvault secret show --vault-name zdrovenakv --name smoke-client-id --query value -o tsv)
          CSC=$(az keyvault secret show --vault-name zdrovenakv --name smoke-client-secret --query value -o tsv)
          echo "::add-mask::$CSC"
          echo "client_id=$CID" >> $GITHUB_OUTPUT
          echo "client_secret=$CSC" >> $GITHUB_OUTPUT

      - name: Get smoke-test bearer token
        id: token
        env:
          SMOKE_CLIENT_ID: ${{ steps.kv.outputs.client_id }}
          SMOKE_CLIENT_SECRET: ${{ steps.kv.outputs.client_secret }}
          TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          API_AUDIENCE: ${{ secrets.AZURE_API_CLIENT_ID }}
        run: |
          TOKEN=$(curl -sf -X POST \
            "https://login.microsoftonline.com/$TENANT_ID/oauth2/v2.0/token" \
            -d "client_id=$SMOKE_CLIENT_ID&client_secret=$SMOKE_CLIENT_SECRET&scope=api://$API_AUDIENCE/.default&grant_type=client_credentials" \
            | jq -r .access_token)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Run E2E tests
        id: run
        env:
          BASE_URL: ${{ needs.resolve-urls.outputs.swa-url }}
          API_URL: ${{ needs.resolve-urls.outputs.api-url }}
          AZURE_TEST_BEARER_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          cd e2e
          npx playwright test --reporter=json,list 2>&1 | tee e2e-results.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "result=$([ $EXIT_CODE -eq 0 ] && echo PASS || echo FAIL)" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-results
          path: |
            e2e/e2e-results.txt
            e2e/playwright-report/

  # ── 6. AI verdict ─────────────────────────────────────────────────────────

  # ── 6. PR summary comment ─────────────────────────────────────────────────
  pr-summary:
    name: Post PR summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [smoke, e2e]
    if: always()
    steps:
      - name: Post result comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const smokeResult = '${{ needs.smoke.outputs.result }}';
            const e2eResult   = '${{ needs.e2e.outputs.result }}';
            const allPass     = smokeResult === 'PASS' && e2eResult === 'PASS';
            const icon        = allPass ? '✅' : '❌';

            const body = `## ${icon} Test Suite: ${allPass ? 'PASS' : 'FAIL'}

            | Check | Result |
            |-------|--------|
            | Smoke tests | ${smokeResult === 'PASS' ? '✅ PASS' : '❌ FAIL'} |
            | E2E tests   | ${e2eResult   === 'PASS' ? '✅ PASS' : '❌ FAIL'} |

            <sub>Commit: \`${{ github.sha }}\` · [Artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('Test Suite'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number, body,
              });
            }

  teardown:
    name: Teardown staging
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [smoke, e2e]
    if: always()
    environment: staging
    env:
      STAGING_APP: zdrovena-api-staging
      RG: zdrovena-rg
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Scale staging to zero
        run: bash scripts/ci/teardown-staging.sh "$STAGING_APP" "$RG"

      - name: Delete SWA staging environment
        env:
          SWA_NAME: ${{ secrets.AZURE_SWA_NAME }}
          SWA_RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          az staticwebapp environment delete \
            --name "$SWA_NAME" \
            --resource-group "$SWA_RG" \
            --environment-name "$PR_NUM" \
            --yes 2>/dev/null || echo "SWA env $PR_NUM already gone or not found — OK"
