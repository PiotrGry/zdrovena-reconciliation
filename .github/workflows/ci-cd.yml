name: CI / CD

# Push to develop  → fast quality gate only (lint, typecheck, test, security)
# PR develop→main  → quality gate + full test suite (staging deploy + smoke + E2E)
# Push to main     → production deploy

on:
  push:
    branches: [develop, main]
    paths:
      - "zdrovena/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "Dockerfile"
      - "e2e/**"
      - ".github/workflows/ci-cd.yml"
      - ".github/workflows/_quality-gate.yml"
      - ".github/workflows/_full-test-suite.yml"
      - ".github/workflows/_deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "zdrovena/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "Dockerfile"
      - "e2e/**"
      - ".github/workflows/ci-cd.yml"
      - ".github/workflows/_quality-gate.yml"
      - ".github/workflows/_full-test-suite.yml"
      - ".github/workflows/_deploy.yml"
  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  pull-requests: write
  id-token: write

concurrency:
  group: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && 'deploy-production' || format('ci-{0}', github.head_ref || github.ref_name) }}
  cancel-in-progress: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}

jobs:
  # ── Fast gate — push to develop (no deploy, no staging) ───────────────────
  fast-gate:
    name: Fast gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_quality-gate.yml
    secrets: inherit

  # ── PR develop → main: quality gate ───────────────────────────────────────
  quality-gate:
    name: Quality gate
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/_quality-gate.yml
    secrets: inherit

  # ── PR develop → main: full test suite (staging + smoke + E2E) ────────────
  full-test-suite:
    name: Full test suite
    if: github.event_name == 'pull_request'
    needs: quality-gate
    uses: ./.github/workflows/_full-test-suite.yml
    secrets: inherit

  # ── CI Gate — single required check ───────────────────────────────────────
  ci-gate:
    name: CI Gate
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [quality-gate, full-test-suite]
    steps:
      - name: Check all jobs passed
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed — ready to merge."

  # ── Production deploy — push to main ──────────────────────────────────────
  deploy:
    name: Deploy production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_deploy.yml
    secrets: inherit
