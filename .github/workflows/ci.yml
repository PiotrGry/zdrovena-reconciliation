name: CI — Lint · Type · Test · Fitness · Security · Infra

on:
  # Run only on PRs targeting develop or main
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

# Cancel outdated runs for the same branch/PR — saves minutes and noise
# github.head_ref is set for pull_request events (= source branch name)
# github.ref_name is set for push events (= branch name)
# Using head_ref||ref_name puts push+PR from the same branch in one group,
# so the newer run cancels the older one — no double billing.
concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # required for trivy SARIF upload
  pull-requests: read     # required for dorny/paths-filter on PRs

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Ruff lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check lint
        run: ruff check .

      - name: Check format
        run: ruff format --check .

  # ── Type check ──────────────────────────────────────────────────────────────
  typecheck:
    name: Pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,api,cloud,report,ksef,pdf]" pyright

      - name: Run Pyright
        run: pyright

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: "pytest + coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,api,cloud]"

      - name: Run tests with coverage
        env:
          AZURE_AUTH_DISABLED: "true"
        run: |
          pytest tests/ -q --tb=short \
            --cov=zdrovena --cov-fail-under=80 \
            --cov-report=term-missing

  # ── Security scan ───────────────────────────────────────────────────────────
  # Runs AFTER tests — don't waste scan time if logic is already broken
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project + security tools
        run: |
          pip install -e ".[dev,api,cloud]"
          pip install pip-audit bandit[toml]

      - name: pip-audit — dependency CVE scan
        run: pip-audit

      - name: bandit — SAST (Python source)
        run: bandit -r zdrovena/ -ll -ii

      - name: gitleaks — secret leak scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: trivy — filesystem CVE scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  # ── Fitness Functions (arch constraints) ────────────────────────────────────
  fitness:
    name: Fitness Functions (arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run module boundary tests
        run: pytest tests/fitness/ -v

  # ── Infra — only when terraform files changed ────────────────────────────────
  infra:
    name: Terraform validate + Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed infra files
        id: changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - 'infra/terraform/**'

      - name: Setup Terraform
        if: steps.changed.outputs.infra == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform init (no backend)
        if: steps.changed.outputs.infra == 'true'
        run: terraform -chdir=infra/terraform init -backend=false

      - name: Terraform validate
        if: steps.changed.outputs.infra == 'true'
        run: terraform -chdir=infra/terraform validate

      - name: Checkov IaC security scan
        if: steps.changed.outputs.infra == 'true'
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform
          quiet: true
          soft_fail: false

      - name: No infra changes — skipped
        if: steps.changed.outputs.infra != 'true'
        run: echo "No terraform files changed, infra checks skipped."

  # ── Docker build (validate only) ────────────────────────────────────────────
  # PR→develop: waliduje Dockerfile, brak push — szybka pętla feedbacku.
  # PR→main: staging-smoke poniżej buduje i pushuje obraz staging-<sha> do ACR.
  # deploy.yml promuje staging-<sha> → <sha>+latest bez ponownego buildu.
  docker-build:
    name: Docker build (validate)
    runs-on: ubuntu-latest
    needs: [test]  # don't build broken code
    steps:
      - uses: actions/checkout@v4

      - name: Build image (no push)
        run: |
          docker build \
            --label "git.sha=${{ github.sha }}" \
            -t zdrovena-api:ci-${{ github.sha }} \
            .

  # ── Staging deploy & smoke (tylko dla PR → main) ───────────────────────────
  # Buduje i pushuje obraz, deployuje na staging Container App, odpala /health.
  # Brama przed merge do main i deployem produkcyjnym.
  # Gdy dojdą kolejne serwisy — ten job stawi całe środowisko i przetestuje
  # integrację zanim cokolwiek trafi na produkcję.
  staging-smoke:
    name: Staging deploy & smoke
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.base_ref == 'main'
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build & push staging image
        env:
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/zdrovena-api
        run: |
          docker build \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.head_ref }}" \
            -t "$IMAGE:staging-${{ github.sha }}" \
            .
          docker push "$IMAGE:staging-${{ github.sha }}"

      # ── Serwisy backendowe ────────────────────────────────────────────────
      - name: Deploy API to staging
        run: |
          az containerapp update \
            --name            "${{ secrets.AZURE_STAGING_CONTAINER_APP_NAME }}" \
            --resource-group  "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image           "${{ secrets.ACR_LOGIN_SERVER }}/zdrovena-api:staging-${{ github.sha }}"

      # Gdy dojdą kolejne serwisy — dodaj tu kolejne az containerapp update:
      # - name: Deploy serwis-X to staging
      #   run: az containerapp update --name staging-serwis-x ...

      # ── Frontend ─────────────────────────────────────────────────────────
      # - name: Deploy SWA (frontend) to staging
      #   run: az staticwebapp deploy --name staging-swa ...

      # ── Monitoring & alerty ──────────────────────────────────────────────
      # - name: Apply staging alert rules
      #   run: az monitor metrics alert update ...

      - name: Resolve staging FQDN
        id: url
        run: |
          FQDN=$(az containerapp show \
            --name "${{ secrets.AZURE_STAGING_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT

      # ── Smoke tests ──────────────────────────────────────────────────────
      - name: API smoke test
        run: |
          for i in 1 2 3 4 5; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 "https://${{ steps.url.outputs.fqdn }}/health")
            echo "Attempt $i: HTTP $HTTP"
            if [[ "$HTTP" == "200" ]]; then
              echo "API smoke test passed."
              exit 0
            fi
            sleep 10
          done
          echo "API smoke test failed." && exit 1

      # ── Testy integracyjne ───────────────────────────────────────────────
      # Gdy dojdą kolejne serwisy — odkomentuj i rozbuduj:
      # - name: Integration tests
      #   run: pytest tests/integration/ -q --base-url="https://${{ steps.url.outputs.fqdn }}"
      # - name: Frontend E2E (Playwright)
      #   run: npx playwright test --project=chromium
      # - name: Alert rule smoke test
      #   run: python scripts/verify_alerts.py --env staging

  # ── CI Gate ─────────────────────────────────────────────────────────────────
  # Single required check to reference in branch protection rules.
  # Fails if ANY upstream job failed or was cancelled.
  # staging-smoke jest skipped dla PRów do develop — to nie jest błąd.
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, fitness, security, infra, docker-build, staging-smoke]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All CI jobs passed."
