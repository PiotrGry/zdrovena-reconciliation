name: CI — Lint · Type · Test · Fitness · Security · Infra

on:
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # required for trivy SARIF upload

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Ruff lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check lint
        run: ruff check .

      - name: Check format
        run: ruff format --check .

  # ── Type check ──────────────────────────────────────────────────────────────
  typecheck:
    name: Pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,api,cloud]" pyright

      - name: Run Pyright
        run: pyright

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: "pytest (cov >= 80%)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,api,cloud]"

      - name: Run tests
        env:
          AZURE_AUTH_DISABLED: "true"
        run: pytest tests/ -q --tb=short --cov=zdrovena --cov-fail-under=80

  # ── Security scan ───────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: pip install pip-audit bandit[toml]

      - name: pip-audit — dependency CVE scan
        run: pip-audit --requirement <(pip install -e ".[dev,api,cloud]" --dry-run -q 2>/dev/null || true) || pip-audit

      - name: bandit — SAST (Python code)
        run: bandit -r zdrovena/ -ll -ii --exclude zdrovena/month_closing/canva_downloader.py

      - name: gitleaks — secret leak scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: trivy — filesystem CVE scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  # ── Fitness Functions (arch constraints) ────────────────────────────────────
  fitness:
    name: Fitness Functions (arch boundaries)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run fitness functions
        run: pytest tests/fitness/ -v

  # ── Infra — only when terraform files changed ────────────────────────────────
  infra:
    name: Terraform validate + Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed infra files
        id: changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - 'infra/terraform/**'

      - name: Setup Terraform
        if: steps.changed.outputs.infra == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform init (no backend)
        if: steps.changed.outputs.infra == 'true'
        run: terraform -chdir=infra/terraform init -backend=false

      - name: Terraform validate
        if: steps.changed.outputs.infra == 'true'
        run: terraform -chdir=infra/terraform validate

      - name: Checkov security scan
        if: steps.changed.outputs.infra == 'true'
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform
          quiet: true
          soft_fail: false

      - name: No infra changes — skipped
        if: steps.changed.outputs.infra != 'true'
        run: echo "No terraform files changed, infra checks skipped."
