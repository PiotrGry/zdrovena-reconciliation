name: Deploy Production (reusable)

on:
  workflow_call:

jobs:
  promote:
    name: Promote image to production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      image: ${{ steps.promote.outputs.image }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Promote staging image
        id: promote
        env:
          ACR: ${{ secrets.ACR_LOGIN_SERVER }}
        run: bash scripts/ci/promote-image.sh "$ACR" "${{ github.sha }}"

  deploy-prod:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: promote
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image
        env:
          PROD_APP: zdrovena-api-prod
          RG: zdrovena-rg
          IMAGE: ${{ needs.promote.outputs.image }}
        run: |
          if [[ -z "$IMAGE" ]]; then
            echo "::error::promote job did not output an image — aborting deploy"
            exit 1
          fi
          az containerapp update \
            --name            "$PROD_APP" \
            --resource-group  "$RG" \
            --image           "$IMAGE" \
            --min-replicas    1

      - name: Wait for production deployment to complete
        env:
          PROD_APP: zdrovena-api-prod
          RG: zdrovena-rg
        run: bash scripts/ci/wait-containerapp.sh "$PROD_APP" "$RG" 36 10

      - name: Production health check
        env:
          CLIENT_ID: ${{ secrets.AZURE_API_CLIENT_ID }}
          PROD_APP: zdrovena-api-prod
          RG: zdrovena-rg
        run: |
          FQDN=$(az containerapp show \
            --name "$PROD_APP" --resource-group "$RG" \
            --query properties.configuration.ingress.fqdn -o tsv)
          bash scripts/ci/smoke-test.sh "https://$FQDN" "$CLIENT_ID"

      - name: Link SWA backend
        env:
          PROD_APP: zdrovena-api-prod
          RG: zdrovena-rg
        run: |
          bash scripts/ci/link-swa-backend.sh \
            "$PROD_APP" "$RG" \
            "${{ secrets.AZURE_SWA_NAME }}" \
            "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            "${{ secrets.AZURE_LOCATION }}"

  # Frontend deploy (SWA production) runs in parallel to backend promote+deploy.
  # Both must succeed before semantic release tags the version.
  deploy-frontend:
    name: Deploy frontend to SWA (production)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate version.json
        run: |
          API_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "//;s/"//')
          MAJOR=$(echo "$API_VERSION" | cut -d. -f1)
          cat > frontend/public/version.json <<EOF
          {
            "frontend_version": "$API_VERSION",
            "api_version": "$API_VERSION",
            "min_api_major": $MAJOR,
            "git_sha": "${{ github.sha }}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (production)
        working-directory: frontend
        env:
          VITE_AZURE_API_CLIENT_ID: ${{ secrets.AZURE_API_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: npm run build

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ secrets.AZURE_SWA_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query properties.apiKey -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to SWA production
        # NOTE: skip_app_build:true + app_location:frontend/dist is intentional —
        # we run vite build above to inject VITE_* secrets at build time. With
        # skip_app_build the Oryx builder is bypassed and the prebuilt dist/ is
        # uploaded as-is. output_location must be empty for this to work.
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ""
          skip_app_build: true

  # Semantic versioning: tag + GitHub Release
  #   feat:          → MINOR bump  (2.0.0 → 2.1.0)
  #   fix:           → PATCH bump  (2.0.0 → 2.0.1)
  #   feat!/BREAKING → MAJOR bump  (2.0.0 → 3.0.0)
  #   ci:/chore:/docs: → no bump
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-prod, deploy-frontend]
    permissions:
      contents: write  # push version bump commit, create tag + GitHub Release
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Run python-semantic-release
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
