name: Deploy Production (reusable)

on:
  workflow_call:

jobs:
  promote:
    name: Promote image to production
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.promote.outputs.image }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Promote staging image
        id: promote
        env:
          ACR: ${{ secrets.ACR_LOGIN_SERVER }}
        run: bash scripts/ci/promote-image.sh "$ACR" "${{ github.sha }}"

  deploy-prod:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: promote
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image
        env:
          PROD_APP: zdrovena-api
          RG: zdrovena-rg
        run: |
          az containerapp update \
            --name            "$PROD_APP" \
            --resource-group  "$RG" \
            --image           "${{ needs.promote.outputs.image }}" \
            --min-replicas    1

      - name: Wait for production deployment to complete
        env:
          PROD_APP: zdrovena-api
          RG: zdrovena-rg
        run: bash scripts/ci/wait-containerapp.sh "$PROD_APP" "$RG" 36 10

      - name: Production health check
        env:
          CLIENT_ID: ${{ secrets.AZURE_API_CLIENT_ID }}
          PROD_APP: zdrovena-api
          RG: zdrovena-rg
        run: |
          FQDN=$(az containerapp show \
            --name "$PROD_APP" --resource-group "$RG" \
            --query properties.configuration.ingress.fqdn -o tsv)
          bash scripts/ci/smoke-test.sh "https://$FQDN" "$CLIENT_ID"

      - name: Link SWA backend
        env:
          PROD_APP: zdrovena-api
          RG: zdrovena-rg
        run: |
          bash scripts/ci/link-swa-backend.sh \
            "$PROD_APP" "$RG" \
            "${{ secrets.AZURE_SWA_NAME }}" \
            "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            "${{ secrets.AZURE_LOCATION }}"

  # Frontend deploy (SWA production) runs in parallel to backend promote+deploy.
  # Both must succeed before semantic release tags the version.
  deploy-frontend:
    name: Deploy frontend to SWA (production)
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate version.json
        run: |
          API_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "//;s/"//')
          MAJOR=$(echo "$API_VERSION" | cut -d. -f1)
          cat > frontend/public/version.json <<EOF
          {
            "frontend_version": "$API_VERSION",
            "api_version": "$API_VERSION",
            "min_api_major": $MAJOR,
            "git_sha": "${{ github.sha }}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (production)
        working-directory: frontend
        env:
          VITE_AZURE_API_CLIENT_ID: ${{ secrets.AZURE_API_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: npm run build

      - name: Deploy to SWA production
        # NOTE: skip_app_build:true + app_location:frontend/dist is intentional —
        # we run vite build above to inject VITE_* secrets at build time. With
        # skip_app_build the Oryx builder is bypassed and the prebuilt dist/ is
        # uploaded as-is. output_location must be empty for this to work.
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ""
          skip_api_build: true
          skip_app_build: true

  # Semantic versioning: tag + GitHub Release
  #   feat:          → MINOR bump  (2.0.0 → 2.1.0)
  #   fix:           → PATCH bump  (2.0.0 → 2.0.1)
  #   feat!/BREAKING → MAJOR bump  (2.0.0 → 3.0.0)
  #   ci:/chore:/docs: → no bump
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    needs: [deploy-prod, deploy-frontend]
    permissions:
      contents: write  # push version bump commit, create tag + GitHub Release
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run python-semantic-release
        uses: python-semantic-release/python-semantic-release@0dc72ac9058a62054a45f6344c83a423d7f906a8 # v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
