name: Deploy Production (reusable)

on:
  workflow_call:

jobs:
  promote:
    name: Promote image to production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Resolve staging SHA
        id: staging-sha
        run: |
          # Merge commits have a second parent (the source branch, e.g. develop).
          # The staging image was built from that SHA, not from the merge commit SHA.
          # Use --verify to test existence without capturing unresolvable ref to stdout.
          if git rev-parse --verify HEAD^2 >/dev/null 2>&1; then
            STAGING_SHA=$(git rev-parse HEAD^2)
          else
            STAGING_SHA="${{ github.sha }}"
          fi
          echo "sha=$STAGING_SHA" >> "$GITHUB_OUTPUT"
          echo "Staging SHA: $STAGING_SHA (github.sha=${{ github.sha }})"

      - name: Promote staging image
        env:
          ACR: ${{ secrets.ACR_LOGIN_SERVER }}
        run: bash scripts/ci/promote-image.sh "$ACR" "${{ steps.staging-sha.outputs.sha }}"

  deploy-prod:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: promote
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image
        env:
          PROD_APP: zdrovena-api-prod
          RG: zdrovena-rg
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/zdrovena-api:${{ github.sha }}
        run: |
          az containerapp update \
            --name            "$PROD_APP" \
            --resource-group  "$RG" \
            --image           "$IMAGE" \
            --min-replicas    1

      - name: Wait for production deployment to complete
        env:
          PROD_APP: zdrovena-api-prod
          RG: zdrovena-rg
        run: bash scripts/ci/wait-containerapp.sh "$PROD_APP" "$RG" 36 10

      - name: Production health check
        env:
          CLIENT_ID: ${{ secrets.AZURE_API_CLIENT_ID }}
          PROD_APP: zdrovena-api-prod
          RG: zdrovena-rg
        run: |
          FQDN=$(az containerapp show \
            --name "$PROD_APP" --resource-group "$RG" \
            --query properties.configuration.ingress.fqdn -o tsv)
          bash scripts/ci/smoke-test.sh "https://$FQDN" "$CLIENT_ID"

      - name: Link SWA backend
        env:
          PROD_APP: zdrovena-api-prod
          RG: zdrovena-rg
        run: |
          bash scripts/ci/link-swa-backend.sh \
            "$PROD_APP" "$RG" \
            "${{ secrets.AZURE_SWA_NAME }}" \
            "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            "${{ secrets.AZURE_LOCATION }}"

      - name: SWA end-to-end smoke test
        env:
          CLIENT_ID: ${{ secrets.AZURE_API_CLIENT_ID }}
          SWA_NAME: ${{ secrets.AZURE_SWA_NAME }}
          SWA_RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          SWA_URL=$(az staticwebapp show \
            --name "$SWA_NAME" --resource-group "$SWA_RG" \
            --query defaultHostname -o tsv)
          bash scripts/ci/smoke-test.sh "https://$SWA_URL" "$CLIENT_ID"

  # Frontend deploy (SWA production) runs in parallel to backend promote+deploy.
  # Both must succeed before semantic release tags the version.
  deploy-frontend:
    name: Deploy frontend to SWA (production)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate version.json
        run: |
          API_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "//;s/"//')
          MAJOR=$(echo "$API_VERSION" | cut -d. -f1)
          cat > frontend/public/version.json <<EOF
          {
            "frontend_version": "$API_VERSION",
            "api_version": "$API_VERSION",
            "min_api_major": $MAJOR,
            "git_sha": "${{ github.sha }}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (production)
        working-directory: frontend
        env:
          VITE_AZURE_API_CLIENT_ID: ${{ secrets.AZURE_API_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: npm run build

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ secrets.AZURE_SWA_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query properties.apiKey -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to SWA production
        # NOTE: skip_app_build:true + app_location:frontend/dist is intentional —
        # we run vite build above to inject VITE_* secrets at build time. With
        # skip_app_build the Oryx builder is bypassed and the prebuilt dist/ is
        # uploaded as-is. output_location must be empty for this to work.
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ""
          skip_app_build: true

  post-deploy-verify:
    name: Post-deploy verify + auto-rollback
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-prod]
    permissions:
      id-token: write
      contents: read
    env:
      PROD_APP: zdrovena-api-prod
      RG: zdrovena-rg
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Smoke against production (retry 3×)
        id: smoke
        continue-on-error: true
        env:
          CLIENT_ID: ${{ secrets.AZURE_API_CLIENT_ID }}
        run: |
          FQDN=$(az containerapp show \
            --name "$PROD_APP" --resource-group "$RG" \
            --query properties.configuration.ingress.fqdn -o tsv)
          for i in 1 2 3; do
            echo "=== Smoke attempt $i/3 ==="
            if bash scripts/ci/smoke-test.sh "https://$FQDN" "$CLIENT_ID"; then
              exit 0
            fi
            [ $i -lt 3 ] && echo "Retrying in 5s..." && sleep 5
          done
          exit 1

      - name: Auto-rollback on smoke failure
        if: steps.smoke.outcome == 'failure'
        run: |
          NEW_REV=$(az containerapp revision list \
            --name "$PROD_APP" --resource-group "$RG" \
            --query "sort_by(@, &properties.createdTime) | [-1].name" \
            -o tsv)
          PREV_REV=$(az containerapp revision list \
            --name "$PROD_APP" --resource-group "$RG" \
            --query "sort_by(@, &properties.createdTime) | [-2].name" \
            -o tsv)
          echo "Rolling back: $NEW_REV → $PREV_REV"
          az containerapp revision activate \
            --name "$PROD_APP" --resource-group "$RG" \
            --revision "$PREV_REV"
          az containerapp revision deactivate \
            --name "$PROD_APP" --resource-group "$RG" \
            --revision "$NEW_REV"

      - name: Notify on rollback
        if: steps.smoke.outcome == 'failure'
        env:
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          [ -z "$NOTIFY_WEBHOOK_URL" ] && exit 0
          curl -sf -X POST "$NOTIFY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"⚠️ Production auto-rollback triggered for ${{ github.sha }}\"}"

      - name: Fail job after rollback
        if: steps.smoke.outcome == 'failure'
        run: exit 1

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [post-deploy-verify, deploy-frontend]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(date +%Y.%m.%d)-${GITHUB_SHA::7}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
