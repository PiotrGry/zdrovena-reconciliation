name: Deploy Production (reusable)

on:
  workflow_call:

jobs:
  promote:
    name: Promote image to production
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.promote.outputs.image }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_OIDC_SP_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Promote staging image
        id: promote
        env:
          ACR: ${{ secrets.ACR_LOGIN_SERVER }}
        run: bash scripts/ci/promote-image.sh "$ACR" "${{ github.sha }}"

  deploy-prod:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: promote
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_OIDC_SP_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image
        env:
          PROD_APP: zdrovena-api
          RG: zdrovena-rg
        run: |
          az containerapp update \
            --name            "$PROD_APP" \
            --resource-group  "$RG" \
            --image           "${{ needs.promote.outputs.image }}" \
            --min-replicas    1

      - name: Wait for production deployment to complete
        env:
          PROD_APP: zdrovena-api
          RG: zdrovena-rg
        run: bash scripts/ci/wait-containerapp.sh "$PROD_APP" "$RG" 36 10

      - name: Production health check
        env:
          CLIENT_ID: ${{ secrets.AZURE_API_CLIENT_ID }}
          PROD_APP: zdrovena-api
          RG: zdrovena-rg
        run: |
          FQDN=$(az containerapp show \
            --name "$PROD_APP" --resource-group "$RG" \
            --query properties.configuration.ingress.fqdn -o tsv)
          bash scripts/ci/smoke-test.sh "https://$FQDN" "$CLIENT_ID"

      - name: Link SWA backend
        env:
          PROD_APP: zdrovena-api
          RG: zdrovena-rg
        run: |
          bash scripts/ci/link-swa-backend.sh \
            "$PROD_APP" "$RG" \
            "${{ secrets.AZURE_SWA_NAME }}" \
            "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            "${{ secrets.AZURE_LOCATION }}"

  # Semantic versioning: tag + GitHub Release
  #   feat:          → MINOR bump  (2.0.0 → 2.1.0)
  #   fix:           → PATCH bump  (2.0.0 → 2.0.1)
  #   feat!/BREAKING → MAJOR bump  (2.0.0 → 3.0.0)
  #   ci:/chore:/docs: → no bump
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    permissions:
      contents: write  # push version bump commit, create tag + GitHub Release
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run python-semantic-release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
