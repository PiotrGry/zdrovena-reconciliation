name: Production health monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  health:
    name: Health check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check /health
        env:
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          FQDN=$(az containerapp show \
            --name zdrovena-api-prod \
            --resource-group zdrovena-rg \
            --query properties.configuration.ingress.fqdn -o tsv)
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://$FQDN/health")
          if [[ "$HTTP" != "200" && "$HTTP" != "401" ]]; then
            echo "FAIL: /health returned $HTTP"
            if [ -n "$NOTIFY_WEBHOOK_URL" ]; then
              curl -sf -X POST "$NOTIFY_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d "{\"text\":\"🚨 Production /health returned $HTTP\"}"
            fi
            exit 1
          fi
          echo "PASS: /health → $HTTP"
