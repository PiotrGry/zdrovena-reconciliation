name: Deploy → Production

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC — no long-lived Azure credentials stored anywhere
# contents: write is scoped to the release job only (see job-level permissions)
permissions:
  id-token: write
  contents: read

# Never cancel a running deploy — let it finish or fail cleanly
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── 1. Promote staging image → production tags ─────────────────────────────
  # CI gate na PR develop→main zbudowało obraz jako staging-<sha> i przetestowało
  # całe środowisko stagingowe. Tutaj tylko retag — ten sam digest, zero kompilacji.
  # Zasada: build once, promote. Na prod trafia dokładnie ten sam obraz co był
  # testowany, nie nowy build z tego samego kodu.
  build:
    name: Promote image to production
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.promote.outputs.image }}

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      # Retag: staging-<sha> → <sha> (immutable, do rollbacku) + latest (mutable pointer)
      # Ten sam obraz co testowany na stagingu — brak docker build
      - name: Promote staging image
        id: promote
        env:
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/zdrovena-api
        run: |
          docker pull "$IMAGE:staging-${{ github.sha }}"
          docker tag  "$IMAGE:staging-${{ github.sha }}" "$IMAGE:${{ github.sha }}"
          docker tag  "$IMAGE:staging-${{ github.sha }}" "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          echo "image=$IMAGE:${{ github.sha }}" >> $GITHUB_OUTPUT

  # ── 3. Deploy to Container App ─────────────────────────────────────────────
  deploy:
    name: Deploy to Container App
    runs-on: ubuntu-latest
    needs: build
    environment: production  # add required reviewers here if needed

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name            "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group  "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image           "${{ needs.build.outputs.image }}"

      # Link SWA → Container App backend (idempotent, safe every deploy)
      - name: Link SWA backend
        run: |
          CONTAINER_APP_ID=$(az containerapp show \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query id --output tsv)

          az staticwebapp backends link \
            --name "${{ secrets.AZURE_SWA_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --backend-resource-id "$CONTAINER_APP_ID" \
            --backend-region "${{ secrets.AZURE_LOCATION }}"

  # ── 4. Smoke test + rollback ───────────────────────────────────────────────
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve app FQDN
        id: url
        run: |
          FQDN=$(az containerapp show \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT
          echo "Health endpoint: https://$FQDN/health"

      # 5 attempts × 10s sleep = up to 50s for the container to become ready
      - name: Health check (with retry)
        id: health
        run: |
          for i in 1 2 3 4 5; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 "https://${{ steps.url.outputs.fqdn }}/health")
            echo "Attempt $i: HTTP $HTTP"
            if [[ "$HTTP" == "200" ]]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 5 attempts."
          exit 1

      # Activate the most recent non-active revision (= the previous deploy)
      - name: Rollback on health check failure
        if: failure() && steps.health.outcome == 'failure'
        run: |
          echo "Rolling back to previous revision..."
          PREV=$(az containerapp revision list \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "[?properties.active==\`false\`] | sort_by(@, &properties.createdTime) | [-1].name" \
            --output tsv)
          if [[ -n "$PREV" ]]; then
            az containerapp revision activate \
              --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --revision "$PREV"
            # Przełącz 100% ruchu na poprzednią rewizję
            az containerapp ingress traffic set \
              --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --revision-weight "$PREV=100"
            echo "Rolled back to revision: $PREV"
            exit 1
          else
            echo "No previous revision found — manual intervention required."
            exit 1
          fi

  # ── 5. Semantic versioning: tag + GitHub Release ───────────────────────────
  # Runs only when smoke test passes.
  # Analyzes conventional commits since the last tag, determines next version:
  #   feat:          → MINOR bump  (2.0.0 → 2.1.0)
  #   fix:           → PATCH bump  (2.0.0 → 2.0.1)
  #   feat!/BREAKING → MAJOR bump  (2.0.0 → 3.0.0)
  #   ci:/chore:/docs: → no bump (exits 0, no tag created)
  # Commits version bump to main with [skip ci] — does NOT re-trigger deploy.
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    needs: [smoke]
    permissions:
      contents: write  # push version bump commit, create tag + GitHub Release
      id-token: write  # inherited: not needed here, harmless

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for commit analysis
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run python-semantic-release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
