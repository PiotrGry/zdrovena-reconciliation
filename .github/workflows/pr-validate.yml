name: PR Validate — develop → main

# Every PR targeting main — runs quality gate only (~1 min).
# Full test suite already ran on develop via develop-gate.yml for the same SHA.
# Quality gate re-runs here to cover fixup commits pushed directly to the PR branch.
#
# Path filtering: Skip for infra-only changes (terraform.yml handles those).

on:
  pull_request:
    branches: [main]
    paths:
      - "zdrovena/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "Dockerfile"
      - "e2e/**"
      - "frontend/**"
      - "clusters/**"
      - ".sops.yaml"
      - ".sops.yaml.example"
      - "docs/devops/**"
      - ".github/workflows/pr-validate.yml"
      - ".github/workflows/_quality-gate.yml"
      # infra/** intentionally omitted — terraform.yml runs plan for those
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write
  security-events: write  # required by _quality-gate.yml (gitleaks/trivy SARIF upload)

concurrency:
  group: pr-validate-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality gate
    uses: ./.github/workflows/_quality-gate.yml
    secrets: inherit

  ci-gate:
    name: CI Gate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [quality-gate]
    steps:
      - name: Check all jobs passed
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed — ready to merge."
