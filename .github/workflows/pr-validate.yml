name: PR Validate — develop → main

# Every PR targeting main runs the fast quality gate. Staging smoke/E2E runs
# only when deployable runtime or the staging test machinery changed.
#
# This workflow always runs for main PRs so the required "CI Gate" status can
# never disappear because of path filters. Documentation-only and unrelated
# workflow changes do not log in to Azure or mutate staging resources.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write
  security-events: write  # required by _quality-gate.yml (gitleaks/trivy SARIF upload)

concurrency:
  group: pr-validate-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  release-source:
    name: Release source
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require develop or an explicitly approved hotfix
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
          HOTFIX_APPROVED: ${{ contains(github.event.pull_request.labels.*.name, 'hotfix-approved') }}
        run: |
          if [[ "$HEAD_BRANCH" == "develop" ]]; then
            echo "Release source is develop."
            exit 0
          fi
          if [[ "$HEAD_BRANCH" == hotfix/* && "$HOTFIX_APPROVED" == "true" ]]; then
            echo "Explicitly approved hotfix source: $HEAD_BRANCH"
            exit 0
          fi
          echo "::error::PRs to main must come from develop. Emergency exception: hotfix/* with the hotfix-approved label."
          exit 1

  quality-gate:
    name: Quality gate
    uses: ./.github/workflows/_quality-gate.yml
    secrets: inherit

  full-test-suite:
    name: Full staging smoke + E2E
    needs: [quality-gate]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.quality-gate.outputs.backend_runtime == 'true' ||
      needs.quality-gate.outputs.frontend == 'true' ||
      needs.quality-gate.outputs.staging == 'true'
    uses: ./.github/workflows/_full-test-suite.yml
    with:
      backend_changed: ${{ needs.quality-gate.outputs.backend_runtime }}
      frontend_changed: ${{ needs.quality-gate.outputs.frontend }}
    secrets: inherit

  ci-gate:
    name: CI Gate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [release-source, quality-gate, full-test-suite]
    steps:
      - name: Check all jobs passed
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All required CI jobs passed; staging may be skipped for non-runtime changes."
