name: PR Validate — develop → main

# Every PR targeting main — runs quality gate + full test suite.
# Quality gate is re-run here (even though it ran on develop for the same SHA)
# because reviewers may push fixup commits to the PR. Without re-running,
# lint/typecheck/security/coverage would not validate the new commits.
#
# Path filtering: Skip for infra-only changes (terraform.yml handles those).

on:
  pull_request:
    branches: [main]
    paths:
      - "zdrovena/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "Dockerfile"
      - "e2e/**"
      - "frontend/**"
      - ".github/workflows/pr-validate.yml"
      - ".github/workflows/_full-test-suite.yml"
      # infra/** intentionally omitted — terraform.yml runs plan for those
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write
  security-events: write  # required by _quality-gate.yml (gitleaks/trivy SARIF upload)

concurrency:
  group: pr-validate-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # Quality gate runs detect-changes + typecheck + security in parallel.
  # Its outputs (backend/frontend changed) are passed to full-test-suite so
  # the duplicate detect-changes job there is a 2s no-op instead of 6s real run.
  quality-gate:
    name: Quality gate
    uses: ./.github/workflows/_quality-gate.yml
    secrets: inherit

  # full-test-suite starts immediately — build Docker image overlaps with
  # typecheck+security (both ~50-65s). deploy-backend inside full-test-suite
  # must wait for quality-gate before it can proceed (gated via ci-gate input).
  # This saves ~40s wall-clock: Docker build no longer sits behind quality-gate.
  full-test-suite:
    name: Full test suite
    needs: quality-gate
    uses: ./.github/workflows/_full-test-suite.yml
    secrets: inherit
    with:
      backend_changed: ${{ needs.quality-gate.outputs.backend }}
      frontend_changed: ${{ needs.quality-gate.outputs.frontend }}

  ci-gate:
    name: CI Gate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [quality-gate, full-test-suite]
    steps:
      - name: Check all jobs passed
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed — ready to merge."
