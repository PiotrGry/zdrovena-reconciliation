name: PR Validate — develop → main

# Every PR targeting main — runs the integration-and-deploy pipeline only.
# The quality gate (lint, typecheck, unit tests, security, infra, frontend lint)
# already ran on the same SHA via develop-gate.yml when the commit landed on
# develop. Re-running it here would duplicate ~3 min of CI for zero new signal:
# the code is identical (same SHA), the checks are deterministic, and our flow
# requires every PR to main to come from develop — so develop-gate is always
# the upstream guard. KISS / DRY.
#
# Path filtering: Skip for infra-only changes (terraform.yml handles those).

on:
  pull_request:
    branches: [main]
    paths:
      - "zdrovena/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "Dockerfile"
      - "e2e/**"
      - "frontend/**"
      - ".github/workflows/pr-validate.yml"
      - ".github/workflows/_full-test-suite.yml"
      # infra/** intentionally omitted — terraform.yml runs plan for those
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: pr-validate-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  full-test-suite:
    name: Full test suite
    uses: ./.github/workflows/_full-test-suite.yml
    secrets: inherit

  ci-gate:
    name: CI Gate
    if: always()
    runs-on: ubuntu-latest
    needs: [full-test-suite]
    steps:
      - name: Check all jobs passed
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed — ready to merge."
