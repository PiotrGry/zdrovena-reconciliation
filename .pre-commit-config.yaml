repos:
  # Python linting (ruff)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.8.0"
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Python type checking (pyright)
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: bash -c 'python3 -m pyright'
        language: system
        pass_filenames: false
        stages: [commit]

  # Frontend linting (eslint)
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && npm run lint:fix'
        language: system
        files: ^frontend/src/
        stages: [commit]

  # Prettier formatting
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: bash -c 'cd frontend && npm run format'
        language: system
        files: \.(jsx?|tsx?|css|json|md)$
        stages: [commit]
